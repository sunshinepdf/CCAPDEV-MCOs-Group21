<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Discover</title>
        <link rel="icon" href="assets\placeholder.png" type="image/png">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="layout.css">
        <link rel="stylesheet" href="header.css">
        <link rel="stylesheet" href="global-sidebar.css">
        <link rel="stylesheet" href="navbar.css">
        <link rel="stylesheet" href="home.css">
        <link rel="stylesheet" href="alert.css">
        <link rel="stylesheet" href="discover.css">


        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="main-content">
            <header-component></header-component>
            <global-sidebar></global-sidebar>
            <div class="container">
                <nav-bar active="discover"></nav-bar>

                <div class="page-section" style="--page-color: #f1b02e;">
                    <div class="content-box" style="--content-bg: #fdf8e2;">

                    <div class="discover-topbar">  
                        <div class="discover-title">
                            <img src="assets/discover-icon.png" alt="discover" width="20" height="20">
                            <div class="title-group">
                                <h1 class="poppins-extrabold">Discover Posts</h1>
                                <div id="discoverDate" class="masthead-sub poppins-regular">—</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="discover-controls">
                        <div class="search-filter-wrapper">
                            <search-bar placeholder="Search posts..." target=".article"></search-bar>
                            <button class="filter-btn" onclick="toggleFilter()">
                                <img src="assets/filter-icon.png" alt="Filter">
                            </button>
                        </div>
                    </div>

                    <div class="filter-overlay" id="filterOverlay">
                        <div class="filter-panel" id="filterPanel">
                            <h4>Filter by Category</h4>
                            <div id="dynamicFilters"></div>
                            <div class="filter-actions">
                                <button onclick="applyFilters()">Filter</button>
                            </div>
                        </div>
                    </div>

                    <div class="paper-grid" id="discoverPosts"></div>
                    <div id="singlePostView" style="display:none;"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Post View Modal -->
        <div id="post-view-modal" style="display: none;">
            <div class="modal-backdrop">
                <div class="modal-container">
                    <button class="modal-close-btn" onclick="closePostModal()">×</button>
                    
                    <div id="modal-post-content"></div>
                    
                    <div class="comments-section">
                        <h3 class="comments-title poppins-extrabold">Comments (<span id="comment-count">0</span>)</h3>
                        
                        <div class="comments-list" id="comments-list"></div>
                        
                        <div class="comment-input-area">
                            <textarea id="comment-input" placeholder="Add a comment..." rows="3" class="comment-textarea"></textarea>
                            <button id="submit-comment-btn" class="submit-comment-btn poppins-extrabold">Post Comment</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="data.js"></script>
        <script src="posts-component.js"></script>
        <script src="search-component.js"></script>
        <script src="discover.js"></script>
        <script src="alert.js"></script>
        <script src="header.js"></script>
        <script src="global-sidebar.js"></script>
        <script src="navbar.js"></script>
    </body>
</html>
