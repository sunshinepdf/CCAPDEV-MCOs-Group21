<!DOCTYPE html>
<html>
    <head>
        <title>Profile</title>
        <link rel="icon" href="assets/placeholder.png" type="image/png">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="layout.css">
        <link rel="stylesheet" href="header.css">
        <link rel="stylesheet" href="global-sidebar.css">
        <link rel="stylesheet" href="navbar.css">
        <link rel="stylesheet" href="alert.css">
        <link rel="stylesheet" href="home.css">
        <link rel="stylesheet" href="profile.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    </head>
    <body>
    <div class="main-content">
        <div class="container">
            <nav-bar active="profile"></nav-bar>
            <div class="page-section" style="--page-color: #504e76;">
                <div class="content-box" style="--content-bg: #fdf8e2;">
                <profile-topbar></profile-topbar>
                <div class="profile-layout">
                    <profile-sidebar></profile-sidebar>
                    <profile-main></profile-main>
                </div>
                    <profile-posts></profile-posts>
                </div>
            </div>
        </div>

        <!-- Edit Post Modal -->
        <div id="edit-post-modal" style="display: none;">
            <div class="modal-backdrop">
                <div class="modal-container">

                <button class="modal-close-btn" onclick="closeEditPostModal()">×</button>

                <h2 class="poppins-extrabold">Edit Post</h2>

                <input 
                    type="text" 
                    id="edit-post-title" 
                    placeholder="Post Title"
                    class="modal-input"
                />

                <textarea 
                    id="edit-post-content" 
                    placeholder="Post Content"
                    rows="6"
                    class="modal-textarea"
                ></textarea>

                <button 
                    id="modal-save-btn"
                    class="submit-comment-btn poppins-extrabold"
                >
                    Save Changes
                </button>

                </div>
            </div>
        </div>

        <!-- Post View Modal -->
        <div id="post-view-modal" style="display: none;">
            <div class="modal-backdrop">
                <div class="modal-container">
                    <button class="modal-close-btn" onclick="closePostModal()">×</button>
                    
                    <div id="modal-post-content"></div>
                    
                    <div class="comments-section">
                        <h3 class="comments-title poppins-extrabold">Comments (<span id="comment-count">0</span>)</h3>
                        
                        <div class="comments-list" id="comments-list"></div>
                        
                        <div class="comment-input-area">
                            <textarea id="comment-input" placeholder="Add a comment..." rows="3" class="comment-textarea"></textarea>
                            <button id="submit-comment-btn" class="submit-comment-btn poppins-extrabold">Post Comment</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="header.js"></script>
    <script src="global-sidebar.js"></script>
    <script src="navbar.js"></script>
    <script src="data.js"></script>
    <script src="posts-component.js"></script>
    <script src="alert.js"></script>
    <script src="search-component.js"></script>
    <script src="profile.js"></script>
    <script src="profile-components.js"></script>
    </body>
</html>
