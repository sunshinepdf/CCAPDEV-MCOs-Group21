<!DOCTYPE html>
<html>
    <head>
        <title>Sign Up</title>
        <link rel="icon" href="assets\placeholder.png" type="image/png">
        <link rel="stylesheet" href="sign-up.css">
        <link rel="stylesheet" href="alert.css">
        <link rel="stylesheet" href="style.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="sign-up-container">
            <div class="sign-up-banner">
                <h2 class="poppins-extrabold">Join the Commons, Archer!</h2>
                <p class="poppins-regular">Discover and explore what the Commons is up to today!</p>
            </div>
            <div class="sign-up-form-container">
                <div class="sign-up-form">
                <h1 class="poppins-extrabold">Sign Up</h1>
                <form id="sign-up-form">
                    <input type="text" id="username" placeholder="Username" required>
                    <span id="username-feedback" class="poppins-regular" style="font-size: 13px; font-weight: bold; margin-top: -10px; margin-bottom: 10px; display: block; text-align: left;"></span>
                    
                    <input type="email" id="email" placeholder="Email" required>
                    <span id="email-feedback" class="poppins-regular" style="font-size: 13px; font-weight: bold; margin-top: -10px; margin-bottom: 10px; display: block; text-align: left;"></span>
                    
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit" class="poppins-regular">Sign Up</button>
                </form>
                <p class="poppins-regular">Already have an account? <a href="login.html" class="poppins-regular">Login here</a></p>
                </div>
            </div>
        </div>
    </body>
    <script src="data.js"></script>
    <script src="alert.js"></script>
    <script src="sign-up.js"></script>
</html>
