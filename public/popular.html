<!DOCTYPE html>
<html>
<head>
    <title>Popular</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="global-sidebar.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="alert.css">
    <link rel="stylesheet" href="popular.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: "Poppins", sans-serif; 
        }
    </style>
</head>
<body>
    <div class="main-content">
        <header-component></header-component>
        <global-sidebar></global-sidebar>
        <div class="container">
            <nav-bar active="popular"></nav-bar>
            <div class="page-section" style="--page-color: #f1642e;">
                <div class="content-box" style="--content-bg: #fdf8e2;">
                    <div class="popular-content">
                        <div class="popular-topbar">
                            <div class="popular-title">
                                <img src="assets/popular-icon.png" alt="popular" width="20" height="20">
                                <div class="title-group">
                                    <h1 class="poppins-extrabold">Popular Posts</h1>
                                    <div id="popularDate" class="masthead-sub poppins-regular">—</div>
                                </div>
                            </div>

                            <div class="popular-controls">
                                <div class="custom-select" id="sortSelect">
                                    <div class="select-trigger">
                                        <span class="trigger-text">Hot</span>
                                        <div class="arrow"></div>
                                    </div>
                                    <div class="options-list">
                                        <div class="option selected" data-value="hot">Hot</div>
                                        <div class="option" data-value="top">Top</div>
                                    </div>
                                </div>

                                <div class="custom-select" id="timeSelect">
                                    <div class="select-trigger">
                                        <span class="trigger-text">Today</span>
                                        <div class="arrow"></div>
                                    </div>
                                    <div class="options-list">
                                        <div class="option selected" data-value="today">Today</div>
                                        <div class="option" data-value="week">This Week</div>
                                        <div class="option" data-value="month">This Month</div>
                                        <div class="option" data-value="year">This Year</div>
                                        <div class="option" data-value="alltime">All Time</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="paper-grid">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Post View Modal -->
    <div id="post-view-modal" style="display: none;">
        <div class="modal-backdrop">
            <div class="modal-container">
                <button class="modal-close-btn" onclick="closePostModal()">×</button>
                
                <div id="modal-post-content"></div>
                
                <div class="comments-section">
                    <h3 class="comments-title poppins-extrabold">Comments (<span id="comment-count">0</span>)</h3>
                    
                    <div class="comments-list" id="comments-list"></div>
                    
                    <div class="comment-input-area">
                        <textarea id="comment-input" placeholder="Add a comment..." rows="3" class="comment-textarea"></textarea>
                        <button id="submit-comment-btn" class="submit-comment-btn poppins-extrabold">Post Comment</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="posts-component.js"></script>
    <script src="alert.js"></script>
    <script src="popular.js"></script>
    <script src="header.js"></script>
    <script src="global-sidebar.js"></script>
    <script src="navbar.js"></script>
</body>
</html>
