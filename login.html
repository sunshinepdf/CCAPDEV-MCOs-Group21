<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <link rel="icon" href="assets\placeholder.png" type="image/png">
        <link rel="stylesheet" href="login.css">
        <link rel="stylesheet" href="alert.css">
        <link rel="stylesheet" href="style.css">    

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="login-container">
            <div class="login-side-banner">
                <h2 class="poppins-extrabold">Welcome back Archer!</h2>
                <p class="poppins-regular">Ready to discover and explore what the Commons is up to today?</p>
            </div>
            <div class="login-form-container">
                <div class="login-form-header">
                    <img src="assets\placeholder.png" alt="AnimoCommons Logo" width="200px" height="180px">
                </div>
                <div class="login-form">
                <h1 class="poppins-extrabold">Login</h1>
                <form id="login-form">
                    <input type="text" id="username" placeholder="Username" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit" class="poppins-regular">Login</button>
                    <div class="remember-me-container">
                        <input type="checkbox" id="remember-me" name="remember-me">
                        <label for="remember-me" class="poppins-regular">Remember Me</label>
                    </div>
                </form>
                <p class="poppins-regular">Don't have an account? <a href="sign-up.html" class="poppins-regular">Sign up here</a></p>
            </div>
        </div>
    </body>
    <script src="data.js"></script>
    <script src="alert.js"></script>
    <script src="login.js"></script>
</html>
