
<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <link rel="icon" href="assets/placeholder.png" type="image/png">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="header.css">
  <link rel="stylesheet" href="global-sidebar.css">
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="alert.css">
  <link rel="stylesheet" href="home.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body>
  <div class="main-content">
    <header-component></header-component>
    <global-sidebar></global-sidebar>

    <div class="container">
      <nav-bar active="home"></nav-bar>

      <div class="page-section" style="--page-color: #a3b565;">
        <div class="content-box" style="--content-bg: #fdf8e2;">

          <div class="home-masthead">
            <div class="masthead-left">
              <div class="home-badge poppins-extrabold">ANIMO COMMONS DAILY</div>
              <div class="masthead-sub poppins-regular" id="mastheadDate">—</div>
            </div>
            <div class="masthead-right">
              <button class="create-post-btn home-create-btn" onclick="openCreatePostModal()">
                + Create Post
              </button>
              <a class="mini-link poppins-extrabold" id="profileLink" href="profile.html">Profile</a>
              <a class="mini-link poppins-extrabold" href="popular.html">Popular</a>
              <a class="mini-link poppins-extrabold" href="discover.html">Discover</a>
              <span class="login-pill poppins-regular" id="loginStatus">—</span>
            </div>
          </div>

          <div class="home-grid">

            <!-- Newspaper posts -->
            <section class="paper-section">
              <div class="section-titlebar">
                <h2 class="poppins-extrabold">Latest Posts</h2>
                <span class="hint poppins-regular">Animo Commons posts</span>
              </div>

              <div class="paper-grid" id="paperGrid"></div>

              <div class="guest-gate" id="viewMoreGate" style="display:none;">
                <p class="poppins-regular">
                  You’re in <b>Guest mode</b>. Login / Sign up to view posts and interact.
                </p>
                <div class="gate-actions">
                  <a class="gate-btn poppins-extrabold" href="login.html">Login</a>
                  <a class="gate-btn outline poppins-extrabold" href="sign-up.html">Sign Up</a>
                </div>
              </div>
            </section>

            <!-- Right rail -->
            <aside class="right-rail">
              <section class="preview-block">
                <div class="section-topbar" style="--section-bg:#f1642e;">
                  <div class="section-title">
                    <img src="assets/popular-icon.png" alt="popular" width="20" height="20">
                    <h3 class="poppins-extrabold">Popular</h3>
                  </div>
                  <a class="view-more poppins-extrabold" href="popular.html">View More</a>
                </div>

                <div class="preview-list" id="popularPreview"></div>
              </section>

              <section class="preview-block">
                <div class="section-topbar" style="--section-bg:#f1b02e;">
                  <div class="section-title">
                    <img src="assets/discover-icon.png" alt="discover" width="20" height="20">
                    <h3 class="poppins-extrabold">Discover Posts</h3>
                  </div>
                  <a class="view-more poppins-extrabold" href="discover.html">View More</a>
                </div>

                <div class="posts-grid-mini" id="discoverPreview"></div>
              </section>
            </aside>

          </div>

          <div id="post-view-modal" style="display: none;">
            <div class="modal-backdrop">
              <div class="modal-container">
                <button class="modal-close-btn" onclick="closePostModal()">×</button>

                <div id="modal-post-content"></div>

                <div class="comments-section">
                  <h3 class="comments-title poppins-extrabold">
                    Comments (<span id="comment-count">0</span>)
                  </h3>

                  <div class="comments-list" id="comments-list"></div>

                  <div class="comment-input-area">
                    <textarea id="comment-input" placeholder="Add a comment..." rows="3" class="comment-textarea"></textarea>
                    <button id="submit-comment-btn" class="submit-comment-btn poppins-extrabold">Post Comment</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
    

        </div>
      </div>
    </div>
  </div>


  <script src="data.js"></script>
  <script src="alert.js"></script>
  <script src="posts-component.js"></script>

  <script src="header.js"></script>
  <script src="global-sidebar.js"></script>
  <script src="navbar.js"></script>


  <script>
    (function () {
      var postsComp = null;

      // Elements
      var paperGrid = null;
      var popularPreview = null;
      var discoverPreview = null;
      var viewMoreGate = null;
      var loginStatus = null;
      var profileLink = null;
      var mastheadDate = null;

      // State
      var LATEST_LIMIT = 20;
      var FREE_COUNT = 11; 

      function getCurrentUserId() {
        return (localStorage.getItem("currentUserId") || "").trim();
      }

      function isLoggedIn() {
        return getCurrentUserId().length > 0;
      }

      function escapeHtml(str) {
        return String(str == null ? "" : str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function excerpt(text, n) {
        var t = String(text || "").trim().replace(/\s+/g, " ");
        if (t.length <= n) return t;
        return t.slice(0, n).trim() + "…";
      }

      function prettyCategory(cat) {
        var c = String(cat || "").toLowerCase();
        if (c === "news") return "News";
        if (c === "help") return "Help";
        return "Discussion";
      }

      function safeTime(post) {
        var d = new Date(post.date || 0).getTime();
        if (!isNaN(d) && d > 0) return d;
        return Number(post.lastInteraction) || 0;
      }

      function score(post) {
        return (Number(post.upvotes) || 0) - (Number(post.downvotes) || 0);
      }

      function setMastheadDate() {
        if (!mastheadDate) return;
        var now = new Date();
        mastheadDate.textContent = now.toLocaleDateString("en-US", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric"
        });
      }

      
      function buildMiniCard(post, locked, showVotes) {
        var user = postsComp.getUserById(post.authorId) || { username: "Unknown", photo: "assets/placeholder.png" };

        var el = document.createElement("div");
        el.className = "post-card-mini" + (locked ? " locked" : "");
        el.setAttribute("data-locked", locked ? "1" : "0");
        el.setAttribute("data-id", post.id);

        var votesLine = showVotes
          ? ('<span>' + (Number(post.views) || 0) + ' Views &#8226; &#9650; ' +
              (Number(post.upvotes) || 0) + ' &#9660; ' + (Number(post.downvotes) || 0) + '</span>')
          : ('<span>' + (Number(post.views) || 0) + ' Views &#8226; Score ' + score(post) + '</span>');

        el.innerHTML =
          '<div class="post-author-header poppins-regular">' +
            '<img src="' + escapeHtml(user.photo) + '" alt="' + escapeHtml(user.username) + '" class="post-author-avatar">' +
            '<div class="post-author-info">' +
              '<span class="post-author-username poppins-extrabold">' + escapeHtml(user.username) + '</span>' +
              '<span class="post-author-date">' + escapeHtml(post.date || "") +
                (post.lastEdited ? ' &#8226; Edited ' + escapeHtml(post.lastEdited) : '') +
              '</span>' +
            '</div>' +
          '</div>' +
          '<h4 class="headline poppins-extrabold">' + escapeHtml(post.title || "") + '</h4>' +
          '<div class="section-row poppins-regular">' + votesLine + '</div>' +
          '<div class="rule"></div>' +
          '<p class="excerpt poppins-regular">' + escapeHtml(excerpt(post.content, 90)) + '</p>' +
          '<div class="tags-mini"><span>' + prettyCategory(post.category) + '</span></div>';

        return el;
      }

      function renderHome() {
        var logged = isLoggedIn();

        setMastheadDate();

        if (loginStatus) loginStatus.textContent = logged ? "Logged in" : "Guest mode";

        if (profileLink && !logged) {
          profileLink.textContent = "Login";
          profileLink.href = "login.html";
        } else if (profileLink && logged) {
          profileLink.textContent = "Profile";
          profileLink.href = "profile.html";
        }

        var posts = postsComp.getPosts().slice();

        // Latest posts 
        var latest = posts
          .slice()
          .sort(function (a, b) { return safeTime(b) - safeTime(a); })
          .slice(0, LATEST_LIMIT);

        // Latest grid 
        if (paperGrid) {
          paperGrid.innerHTML = "";
          latest.forEach(function (post, idx) {
            var lockedPost = (!logged && idx >= FREE_COUNT);
            paperGrid.appendChild(postsComp.buildNewspaperArticle(post, idx, lockedPost));
          });
        }

        if (viewMoreGate) viewMoreGate.style.display = (!logged) ? "block" : "none";

        // Popular preview 
        if (popularPreview) {
          popularPreview.innerHTML = "";
          var popular = posts
            .slice()
            .sort(function (a, b) { return score(b) - score(a); })
            .slice(0, 4);

          popular.forEach(function (p) {
            var lockedMini = !logged; // lock all popular preview for guests
            popularPreview.appendChild(buildMiniCard(p, lockedMini, false));
          });
        }

        // Discover preview 
        if (discoverPreview) {
          discoverPreview.innerHTML = "";
          var discover = latest.slice(0, 4);

          discover.forEach(function (p, idx) {
            var lockedMini = (!logged && idx >= 1);
            discoverPreview.appendChild(buildMiniCard(p, lockedMini, true));
          });
        }
      }

      function bindLatestGridActions() {
        if (!paperGrid) return;

        paperGrid.addEventListener("click", function (e) {
          var btn = e.target.closest("button");
          if (!btn) return;

          var action = btn.getAttribute("data-action");
          var postId = btn.getAttribute("data-id");
          if (!action || !postId) return;

          var article = btn.closest("article");
          var isLocked = article && article.getAttribute("data-locked") === "1";
          var uid = getCurrentUserId();

          if (isLocked) {
            AlertModal.show("Please login / sign up to view more posts and interact.", "error");
            return;
          }

          if (action === "open" || action === "comment") {
            window.openPostModal(postId);
            return;
          }

          if (action === "up" || action === "down") {
            if (!uid) {
              AlertModal.show("Please login to vote.", "error");
              return;
            }
            postsComp.voteOnPost(postId, action);
            renderHome();
            return;
          }
        });
      }

      function bindMiniPreviewOpen(containerEl) {
        if (!containerEl) return;

        containerEl.addEventListener("click", function (e) {
          var card = e.target.closest(".post-card-mini");
          if (!card) return;

          var isLocked = card.getAttribute("data-locked") === "1";
          var uid = getCurrentUserId();
          var postId = card.getAttribute("data-id");

          if (isLocked || !uid) {
            AlertModal.show("Please login / sign up to view and interact with posts.", "error");
            return;
          }

          window.openPostModal(postId);
        });
      }

      document.addEventListener("DOMContentLoaded", function () {
        // IMPORTANT: posts-component.js must be loaded already
        postsComp = window.PostsComponent_Instance;
        if (!postsComp) {
          console.error("PostsComponent_Instance not found. Make sure posts-component.js is loaded.");
          return;
        }

        paperGrid = document.getElementById("paperGrid");
        popularPreview = document.getElementById("popularPreview");
        discoverPreview = document.getElementById("discoverPreview");
        viewMoreGate = document.getElementById("viewMoreGate");
        loginStatus = document.getElementById("loginStatus");
        profileLink = document.getElementById("profileLink");
        mastheadDate = document.getElementById("mastheadDate");

        renderHome();
        bindLatestGridActions();
        bindMiniPreviewOpen(popularPreview);
        bindMiniPreviewOpen(discoverPreview);
      });
    })();
  </script>
</body>
</html>
