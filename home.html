<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <link rel="icon" href="assets/placeholder.png" type="image/png">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="header.css">
  <link rel="stylesheet" href="global-sidebar.css">
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="alert.css">
  <link rel="stylesheet" href="home.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body>
  <div class="main-content">
    <header-component></header-component>
    <global-sidebar></global-sidebar>

    <div class="container">
      <nav-bar active="home"></nav-bar>

      <div class="page-section" style="--page-color: #a3b565;">
        <div class="content-box" style="--content-bg: #fdf8e2;">

          <div class="home-masthead">
            <div class="masthead-left">
              <div class="home-badge poppins-extrabold">ANIMO COMMONS DAILY</div>
              <div class="masthead-sub poppins-regular" id="mastheadDate">—</div>
            </div>
            <div class="masthead-right">
              <button class="create-post-btn home-create-btn" onclick="openCreatePostModal()">
                + Create Post
              </button>
              <a class="mini-link poppins-extrabold" id="profileLink" href="profile.html">Profile</a>
              <a class="mini-link poppins-extrabold" href="popular.html">Popular</a>
              <a class="mini-link poppins-extrabold" href="discover.html">Discover</a>
              <span class="login-pill poppins-regular" id="loginStatus">—</span>
            </div>
          </div>

          <div class="home-grid">

            <!-- Newspaper posts -->
            <section class="paper-section">
              <div class="section-titlebar">
                <h2 class="poppins-extrabold">Latest Posts</h2>
                <span class="hint poppins-regular">Animo Commons posts</span>
              </div>

              <div class="paper-grid" id="paperGrid"></div>

              <div class="guest-gate" id="viewMoreGate" style="display:none;">
                <p class="poppins-regular">
                  You’re in <b>Guest mode</b>. Login / Sign up to view posts and interact.
                </p>
                <div class="gate-actions">
                  <a class="gate-btn poppins-extrabold" href="login.html">Login</a>
                  <a class="gate-btn outline poppins-extrabold" href="sign-up.html">Sign Up</a>
                </div>
              </div>
            </section>

            <!-- Right rail -->
            <aside class="right-rail">
              <section class="preview-block">
                <div class="section-topbar" style="--section-bg:#f1642e;">
                  <div class="section-title">
                    <img src="assets/popular-icon.png" alt="popular" width="20" height="20">
                    <h3 class="poppins-extrabold">Popular</h3>
                  </div>
                  <a class="view-more poppins-extrabold" href="popular.html">View More</a>
                </div>

                <div class="preview-list" id="popularPreview"></div>
              </section>

              <section class="preview-block">
                <div class="section-topbar" style="--section-bg:#f1b02e;">
                  <div class="section-title">
                    <img src="assets/discover-icon.png" alt="discover" width="20" height="20">
                    <h3 class="poppins-extrabold">Discover Posts</h3>
                  </div>
                  <a class="view-more poppins-extrabold" href="discover.html">View More</a>
                </div>

                <div class="posts-grid-mini" id="discoverPreview"></div>
              </section>
            </aside>

          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Core scripts -->
  <script src="data.js"></script>
  <script src="posts-component.js"></script>
  <script src="alert.js"></script>
  <script src="header.js"></script>
  <script src="global-sidebar.js"></script>
  <script src="navbar.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var paperGrid = document.getElementById("paperGrid");
      var popularPreview = document.getElementById("popularPreview");
      var discoverPreview = document.getElementById("discoverPreview");
      var viewMoreGate = document.getElementById("viewMoreGate");
      var loginStatus = document.getElementById("loginStatus");
      var profileLink = document.getElementById("profileLink");
      var mastheadDate = document.getElementById("mastheadDate");

      function isLoggedIn() {
        var id = (localStorage.getItem("currentUserId") || "").trim();
        return id.length > 0;
      }

      function getAuthorName(authorId) {
        var users = (window.mockDatabase && window.mockDatabase.users) ? window.mockDatabase.users : [];
        var u = users.find(function (x) { return x && x.id === authorId; });
        return u ? (u.username || String(authorId || "Anonymous")) : String(authorId || "Anonymous");
      }

      function escapeHtml(str) {
        return String(str == null ? "" : str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function excerpt(text, n) {
        var t = String(text || "").trim().replace(/\s+/g, " ");
        if (t.length <= n) return t;
        return t.slice(0, n).trim() + "…";
      }

      function parseDateSafe(dateStr) {
        var d = new Date(dateStr);
        if (!isNaN(d.getTime())) return d;
        return new Date(0);
      }

      function prettyCategory(cat) {
        var c = String(cat || "").toLowerCase();
        if (c === "news") return "News";
        if (c === "help") return "Help";
        return "Discussion";
      }

      // Get posts from the shared database component
      var posts = PostsComponent_Instance.getDatabase().posts || [];

      function addView(postId) {
        PostsComponent_Instance.incrementViewCount(postId);
      }

      function buildNewspaperArticle(post, index, locked) {
        return PostsComponent_Instance.buildNewspaperArticle(post, index, locked);
      }

      function buildPopularRow(post, locked) {
        var user = PostsComponent_Instance.getUserById(post.authorId) || { username: "Unknown", photo: "assets/placeholder.png" };
        var score = (Number(post.upvotes) || 0) - (Number(post.downvotes) || 0);

        var el = document.createElement("div");
        el.className = "post-card-mini" + (locked ? " locked" : "");
        el.setAttribute("data-locked", locked ? "1" : "0");
        el.setAttribute("data-id", post.id);

        el.innerHTML =
          '<div class="post-author-header poppins-regular">' +
            '<img src="' + user.photo + '" alt="' + escapeHtml(user.username) + '" class="post-author-avatar">' +
            '<div class="post-author-info">' +
              '<span class="post-author-username poppins-extrabold">' + escapeHtml(user.username) + '</span>' +
              '<span class="post-author-date">' + escapeHtml(post.date) + (post.lastEdited ? ' &#8226; Edited ' + post.lastEdited : '') + '</span>' +
            '</div>' +
          '</div>' +
          '<h4 class="headline poppins-extrabold">' + escapeHtml(post.title) + '</h4>' +
          '<div class="section-row poppins-regular">' +
            '<span>' + (Number(post.views) || 0) + ' Views &#8226; Score ' + score + '</span>' +
          '</div>' +
          '<div class="rule"></div>' +
          '<p class="excerpt poppins-regular">' + escapeHtml(excerpt(post.content, 90)) + '</p>' +
          '<div class="tags-mini"><span>' + prettyCategory(post.category) + '</span></div>';

        return el;
      }

      function buildDiscoverCard(post, locked) {
        var user = PostsComponent_Instance.getUserById(post.authorId) || { username: "Unknown", photo: "assets/placeholder.png" };

        var el = document.createElement("div");
        el.className = "post-card-mini" + (locked ? " locked" : "");
        el.setAttribute("data-category", post.category || "discussion");
        el.setAttribute("data-locked", locked ? "1" : "0");
        el.setAttribute("data-id", post.id);

        el.innerHTML =
          '<div class="post-author-header poppins-regular">' +
            '<img src="' + user.photo + '" alt="' + escapeHtml(user.username) + '" class="post-author-avatar">' +
            '<div class="post-author-info">' +
              '<span class="post-author-username poppins-extrabold">' + escapeHtml(user.username) + '</span>' +
              '<span class="post-author-date">' + escapeHtml(post.date) + (post.lastEdited ? ' &#8226; Edited ' + post.lastEdited : '') + '</span>' +
            '</div>' +
          '</div>' +
          '<h4 class="headline poppins-extrabold">' + escapeHtml(post.title) + '</h4>' +
          '<div class="section-row poppins-regular">' +
            '<span>' + (Number(post.views) || 0) + ' Views &#8226; &#9650; ' + (Number(post.upvotes) || 0) + ' &#9660; ' + (Number(post.downvotes) || 0) + '</span>' +
          '</div>' +
          '<div class="rule"></div>' +
          '<p class="excerpt poppins-regular">' + escapeHtml(excerpt(post.content, 90)) + '</p>' +
          '<div class="tags-mini"><span>' + prettyCategory(post.category) + '</span></div>';

        return el;
      }

      function render() {
        if (mastheadDate) {
          mastheadDate.textContent = new Date().toLocaleDateString("en-US", {
            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric"
          });
        }

        var logged = isLoggedIn();
        var activeUserId = (localStorage.getItem("currentUserId") || "").trim();

        if (loginStatus) loginStatus.textContent = logged ? "Logged in" : "Guest mode";

        if (profileLink && !logged) {
          profileLink.textContent = "Login";
          profileLink.href = "login.html";
        }

        // ✅ Latest posts: sort by date desc (most recent first)
        var latest = posts
          .slice()
          .sort(function (a, b) {
            return parseDateSafe(b.date).getTime() - parseDateSafe(a.date).getTime();
          })
          .slice(0, 20);

        // ✅ Guest sees only first 15 posts unblurred, others locked/blurred
        var FREE_COUNT = 14;

        if (paperGrid) {
          paperGrid.innerHTML = "";
          latest.forEach(function (post, i) {
            var lockedPost = (!logged && i >= FREE_COUNT);
            paperGrid.appendChild(buildNewspaperArticle(post, i, lockedPost));
          });
        }

        if (viewMoreGate) {
          viewMoreGate.style.display = !logged ? "block" : "none";
        }

        // Popular: sort by score desc (top 4)
        if (popularPreview) {
          popularPreview.innerHTML = "";
          var popular = posts
            .slice()
            .sort(function (a, b) {
              var scoreB = (Number(b.upvotes) || 0) - (Number(b.downvotes) || 0);
              var scoreA = (Number(a.upvotes) || 0) - (Number(a.downvotes) || 0);
              return scoreB - scoreA;
            })
            .slice(0, 4);

          popular.forEach(function (p, idx) {
            // guest: lock all (or you can allow 1 free here too — your call)
            var lockedRow = !logged;
            popularPreview.appendChild(buildPopularRow(p, lockedRow));
          });
        }

        // ✅ Discover: MOST RECENT posts by date
        if (discoverPreview) {
          discoverPreview.innerHTML = "";

          // show 4 newest, but guest only gets 1 unlocked (the newest)
          var discover = latest.slice(0, 4);

          discover.forEach(function (p, i) {
            var lockedCard = (!logged && i >= 1);
            discoverPreview.appendChild(buildDiscoverCard(p, lockedCard));
          });
        }

        // ✅ Modal functions
        function openPostModal(postId) {
          var post = PostsComponent_Instance.getPostById(postId);
          if (!post) return;
          
          var user = PostsComponent_Instance.getUserById(post.authorId) || { username: "Unknown", photo: "assets/placeholder.png" };
          var score = (Number(post.upvotes) || 0) - (Number(post.downvotes) || 0);
          
          // Render full article in modal
          var modalContent = document.getElementById("modal-post-content");
          modalContent.innerHTML = 
            '<div class="post-author-header poppins-regular">' +
              '<img src="' + user.photo + '" alt="' + escapeHtml(user.username) + '" class="post-author-avatar">' +
              '<div class="post-author-info">' +
                '<span class="post-author-username poppins-extrabold">' + escapeHtml(user.username) + '</span>' +
                '<span class="post-author-date">' + escapeHtml(post.date) + (post.lastEdited ? ' &#8226; Edited ' + post.lastEdited : '') + '</span>' +
              '</div>' +
            '</div>' +
            '<h2 class="headline poppins-extrabold">' + escapeHtml(post.title) + '</h2>' +
            '<div class="section-row poppins-regular">' +
              '<span>' + (Number(post.views) || 0) + ' Views &#8226; &#9650; ' + (Number(post.upvotes) || 0) + ' &#9660; ' + (Number(post.downvotes) || 0) + '</span>' +
            '</div>' +
            '<div class="rule"></div>' +
            '<p class="excerpt poppins-regular">' + escapeHtml(post.content) + '</p>' +
            '<div class="tags-mini"><span>' + prettyCategory(post.category) + '</span></div>';
          
          // Render comments
          renderComments(post);
          
          // Show modal
          var modal = document.getElementById("post-view-modal");
          modal.style.display = "flex";
          modal.setAttribute("data-post-id", postId);
          
          // Close backdrop click
          var backdrop = modal.querySelector(".modal-backdrop");
          backdrop.onclick = function(e) {
            if (e.target === backdrop) {
              modal.style.display = "none";
            }
          };
        }

        function renderComments(post) {
          var comments = post.comments || [];
          var commentsList = document.getElementById("comments-list");
          var commentCount = document.getElementById("comment-count");
          
          commentCount.textContent = comments.length;
          commentsList.innerHTML = "";
          
          comments.forEach(function(comment) {
            var commentEl = document.createElement("div");
            commentEl.className = "comment-item";
            
            var user = PostsComponent_Instance.getUserById(comment.userId) || { username: "Unknown" };
            
            commentEl.innerHTML = 
              '<div class="comment-header poppins-regular">' +
                '<span class="comment-author poppins-extrabold">' + escapeHtml(user.username) + '</span>' +
                '<span class="comment-date">' + escapeHtml(comment.date || new Date().toLocaleDateString()) + '</span>' +
              '</div>' +
              '<p class="comment-text poppins-regular">' + escapeHtml(comment.text) + '</p>';
            
            commentsList.appendChild(commentEl);
          });
        }

        // ✅ Newspaper voting + open (block if locked/guest)
        if (paperGrid) {
          paperGrid.onclick = function (e) {
            var t = e.target;
            if (!t) return;

            var action = t.getAttribute("data-action");
            var id = t.getAttribute("data-id");
            if (!action || !id) return;

            var article = t.closest(".article");
            var isLocked = article && article.getAttribute("data-locked") === "1";

            // strict guard: must be logged in AND not locked
            var activeUserId = (localStorage.getItem("currentUserId") || "").trim();
            var loggedNow = activeUserId.length > 0;

            if (!loggedNow || isLocked) {
                AlertModal.show("Please login or sign up to view and interact with posts.", "error");
                return;
            }

            if (action === "open" || action === "comment") {
                addView(id);
                openPostModal(id);
                render();
                return;
            }

            if (action === "up") {
                PostsComponent_Instance.voteOnPost(id, "up");
                AlertModal.show("Vote updated!", "success");
                render();
                return;
            }

            if (action === "down") {
                PostsComponent_Instance.voteOnPost(id, "down");
                AlertModal.show("Vote updated!", "success");
                render();
                return;
            }

          };
            
        }

        // ✅ Popular preview voting + open
        if (popularPreview) {
          popularPreview.onclick = function (e) {
            var t = e.target.closest(".post-card-mini");
            if (!t) return;

            var activeUserId = (localStorage.getItem("currentUserId") || "").trim();
            var loggedNow = activeUserId.length > 0;
            var isLocked = t.getAttribute("data-locked") === "1";
            var id = t.getAttribute("data-id");

            if (!loggedNow || isLocked) {
                AlertModal.show("Please login or sign up to view and interact with posts.", "error");
                return;
            }

            addView(id);
            openPostModal(id);
            render();
          };
        }

        // ✅ Discover preview voting + open
        if (discoverPreview) {
          discoverPreview.onclick = function (e) {
            var t = e.target.closest(".post-card-mini");
            if (!t) return;

            var activeUserId = (localStorage.getItem("currentUserId") || "").trim();
            var loggedNow = activeUserId.length > 0;
            var isLocked = t.getAttribute("data-locked") === "1";
            var id = t.getAttribute("data-id");

            if (!loggedNow || isLocked) {
                AlertModal.show("Please login or sign up to view and interact with posts.", "error");
                return;
            }

            addView(id);
            openPostModal(id);
            render();
          };
        }

        // ✅ Comment submission
        var submitBtn = document.getElementById("submit-comment-btn");
        if (submitBtn) {
          submitBtn.onclick = function() {
            var modal = document.getElementById("post-view-modal");
            var postId = modal.getAttribute("data-post-id");
            var commentText = document.getElementById("comment-input").value.trim();
            var currentUserId = (localStorage.getItem("currentUserId") || "").trim();
            
            if (!currentUserId) {
              AlertModal.show("Please login to add comments.", "error");
              return;
            }
            
            if (!commentText) {
              AlertModal.show("Comment cannot be empty.", "error");
              return;
            }
            
            var post = PostsComponent_Instance.getPostById(postId);
            if (!post) return;
            
            // Add comment to post
            post.comments = post.comments || [];
            post.comments.push({
              userId: currentUserId,
              text: commentText,
              date: new Date().toLocaleDateString()
            });
            
            // Save to localStorage
            localStorage.setItem('mockDatabase', JSON.stringify(PostsComponent_Instance.getDatabase()));
            
            // Clear input and re-render
            document.getElementById("comment-input").value = "";
            renderComments(post);
            render();
            AlertModal.show("Comment posted!", "success");
          };
        }
    
      }

      render();
    });

    function openCreatePostModal() {
      var currentUser = (localStorage.getItem("currentUserId") || "").trim();

      if (!currentUser) {
        AlertModal.show("You must be logged in to create a post.", "error");
        return;
      }

      document.getElementById("create-post-modal").style.display = "flex";
    }

    function closeCreatePostModal() {
      document.getElementById("create-post-modal").style.display = "none";
    }

    function submitNewPost() {

      var title = document.getElementById("create-title").value.trim();
      var content = document.getElementById("create-content").value.trim();
      var category = document.getElementById("create-category").value;

      if (!title || !content || !category) {
        AlertModal.show("Please complete all fields.", "error");
        return;
      }

      var db = PostsComponent_Instance.getDatabase();
      var currentUserId = localStorage.getItem("currentUserId");

      var newPost = {
        id: "p" + Date.now(),
        authorId: currentUserId,
        category: category,
        title: title,
        content: content,
        date: new Date().toLocaleDateString("en-US", {
          month: "short",
          day: "2-digit",
          year: "numeric"
        }),
        upvotes: 0,
        downvotes: 0,
        views: 0,
        lastInteraction: Date.now(),
        comments: []
      };

      db.posts.unshift(newPost);

      localStorage.setItem("mockDatabase", JSON.stringify(db));

      document.getElementById("create-post-modal").style.display = "none";

      location.reload();
    }


  </script>

  <!-- Post View Modal -->
  <div id="post-view-modal" style="display: none;">
    <div class="modal-backdrop">
      <div class="modal-container">
        <button class="modal-close-btn" onclick="closePostModal()">×</button>
        
        <div id="modal-post-content"></div>
        
        <div class="comments-section">
          <h3 class="comments-title poppins-extrabold">Comments (<span id="comment-count">0</span>)</h3>
          
          <div class="comments-list" id="comments-list"></div>
          
          <div class="comment-input-area">
            <textarea id="comment-input" placeholder="Add a comment..." rows="3" class="comment-textarea"></textarea>
            <button id="submit-comment-btn" class="submit-comment-btn poppins-extrabold">Post Comment</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="create-post-modal" style="display: none;">
    <div class="modal-backdrop">
      <div class="modal-container">
        <button class="modal-close-btn" onclick="closeCreatePostModal()">×</button>

        <h2 class="poppins-extrabold">Create New Post</h2>

        <input 
          type="text" 
          id="create-title" 
          placeholder="Post Title" 
          class="modal-input"
        />

        <textarea 
          id="create-content" 
          placeholder="Write your post here..." 
          rows="6"
          class="modal-textarea"
        ></textarea>

        <select id="create-category" class="modal-select">
          <option value="">Select Category</option>
          <option value="discussion">Discussion</option>
          <option value="news">News</option>
          <option value="help">Help</option>
        </select>

        <button 
          class="submit-comment-btn poppins-extrabold"
          onclick="submitNewPost()"
        >
          Publish Post
        </button>
      </div>
    </div>
  </div>

  <script>
    // Global modal functions
    function closePostModal() {
      document.getElementById('post-view-modal').style.display = 'none';
    }
  </script>
</body>
</html>
