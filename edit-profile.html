<!DOCTYPE html>
<html>
    <head>
        <title>Edit Profile</title>
        <link rel="icon" href="D:\Khyle\HTML\AnimoCommons\assets\placeholder.png" type="image/png">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="layout.css">
        <link rel="stylesheet" href="navbar.css">
        <link rel="stylesheet" href="profile.css">
        <style>
            /* Show editing elements in edit mode */
            .tag-remove {
                display: inline !important;
            }
            .tag-input {
                display: inline-flex !important;
            }
        </style>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    </head>
    <body >
    <div class="topbar">
        <h1 class="poppins-extrabold">AnimoCommons</h1>
    </div>
    <div class="container">
        <nav-bar active="profile"></nav-bar>
        <div class="page-section" style="--page-color: #504e76;">
            <div class="content-box" style="--content-bg: #fdf8e2;">
                <div class="profile-topbar">
                    <div class="profile-title">
                        <img src="assets/profile-icon.png" alt="profile" width="20" height="20">
                        <h1 class="poppins-extrabold">Edit Profile</h1>
                    </div>
                    <div class="profile-search-bar">
                        <img src="assets/search-icon.png" alt="search" width="16" height="16" class="search-icon">
                        <input type="text" placeholder="Find other users...">
                    </div>
                    <div class="profile-icons">
                        <img src="assets/search-icon.png" alt="search" width="24" height="24">
                        <img src="assets/notifications-icon.png" alt="notifications" width="24" height="24">
                        <img src="assets/settings-icon.png" alt="settings" width="24" height="24">
                    </div>
                </div>
                <div class="user-profile-header">
                    <div class="profile-avatar">
                        <img src="assets/placeholder.png" alt="Profile photo">
                        <div class="btn-edit-pfp">
                            <img src="assets/edit-image.png" alt="Status" width="12px" height="12px">
                        </div>
                    </div>
                    <div class="profile-info">
                        <button class="btn-edit-profile poppins-extrabold" onclick="window.location.href='profile.html'">Save Changes</button>
                        <div class="profile-content">
                            <input type="text" class="poppins-extrabold" value="Username" style="font-size: 24px; border: 2px solid #504e76; padding: 8px; border-radius: 8px; width: 100%;">
                            <textarea class="poppins-extrabold-italic" placeholder="About Me" style="font-size: 16px; border: 2px solid #504e76; padding: 8px; border-radius: 8px; width: 100%; margin-top: 10px; font-family: Poppins; resize: vertical;"></textarea>
                            <textarea class="poppins-regular" placeholder="This is a sample bio for the user profile..." style="font-size: 14px; border: 2px solid #504e76; padding: 8px; border-radius: 8px; width: 100%; margin-top: 10px; font-family: Poppins; min-height: 100px; resize: vertical;"></textarea>
                            <div class="profile-tags">
                                <div class="profile-tag">
                                    <img src="assets/college-icon.png" alt="College" width="16" height="16">
                                    <span class="poppins-extrabold">CCS</span>
                                    <button class="tag-remove" aria-label="Remove tag">×</button>
                                </div>
                                <div class="profile-tag">
                                    <img src="assets/batch-icon.png" alt="Batch" width="16" height="16">
                                    <span class="poppins-extrabold">ID 124</span>
                                    <button class="tag-remove" aria-label="Remove tag">×</button>
                                </div>
                                <div class="profile-tag">
                                    <span class="poppins-extrabold">Friendly</span>
                                    <button class="tag-remove" aria-label="Remove tag">×</button>
                                </div>
                                <input type="text" class="tag-input" placeholder="Add a tag..." id="newTagInput">
                            </div>
                        </div>
                    </div>
            </div>
        </div>
    </div>
    <script src="navbar.js"></script>
    <script src="profile.js"></script>
    </body>
</html>
