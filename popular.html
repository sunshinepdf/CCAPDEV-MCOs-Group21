<!DOCTYPE html>
<html>
        <head>
        <title>Popular</title>
        <link rel="icon" href="assets/placeholder.png" type="image/png">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="layout.css">
        <link rel="stylesheet" href="header.css">
        <link rel="stylesheet" href="global-sidebar.css">
        <link rel="stylesheet" href="navbar.css">
        <link rel="stylesheet" href="home.css">
        <link rel="stylesheet" href="alert.css">
        <link rel="stylesheet" href="popular.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <style>
            body {
                font-family: "Poppins", sans-serif;
            }
        </style>
    </head>
    <body>
        <div class="main-content">
            <header-component></header-component>
            <global-sidebar></global-sidebar>
            <div class="container">
                <nav-bar active="popular"></nav-bar>
                <div class="page-section" style="--page-color: #f1642e;">
                    <div class="content-box" style="--content-bg: #fdf8e2;">
        <div class="popular-content">
                            <div class="popular-topbar">
                                <div class="popular-title">
                                    <img src="assets/popular-icon.png" alt="popular" width="20" height="20">
                                    <h1 class="poppins-extrabold">Popular Posts</h1>
                                </div>
                            </div>
                            <div class="popular-controls">
                                <select onchange="changeSortMode(this.value)">
                                    <option value="hot">Hot</option>
                                    <option value="top">Top</option>
                                </select>
                                <select id="timeframeDropdown" onchange="changeTimeframe(this.value)" style="display: none;">
                                    <option value="today">Today</option>
                                    <option value="week">This Week</option>
                                    <option value="month">This Month</option>
                                    <option value="year">This Year</option>
                                    <option value="alltime">All Time</option>
                                </select>
                            </div>
                            <div class="paper-grid">
                                <!-- Posts will be dynamically loaded here by popular.js -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="data.js"></script>
        <script src="alert.js"></script>
        <script src="popular.js"></script>
        <script src="header.js"></script>
        <script src="global-sidebar.js"></script>
        <script src="navbar.js"></script>
    </body>
</html>
